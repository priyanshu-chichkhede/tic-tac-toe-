<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Toe</title>
<style>
  :root {
    --bg-deep: #0b1220;
    --bg-panel: #121b2e;
    --grid-line: #24334f;
    --accent-x: #5eead4;
    --accent-o: #f7b955;
    --text-main: #e8edf5;
    --text-dim: #7c8aa5;
    --win-glow: #5eead4;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at 20% 15%, #16233d 0%, var(--bg-deep) 55%);
    color: var(--text-main);
    font-family: 'Courier New', Consolas, monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .app {
    width: 100%;
    max-width: 480px;
  }

  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 0 0 4px;
  }

  h1 {
    font-size: 34px;
    margin: 0 0 24px;
    letter-spacing: -0.02em;
  }
  h1 span { color: var(--accent-x); }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg-panel);
    border: 1px solid var(--grid-line);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 18px;
  }

  #status { font-size: 15px; }
  #status .mark-x { color: var(--accent-x); font-weight: bold; }
  #status .mark-o { color: var(--accent-o); font-weight: bold; }

  .mode-toggle {
    display: flex;
    gap: 6px;
    background: var(--bg-deep);
    padding: 4px;
    border-radius: 8px;
    border: 1px solid var(--grid-line);
  }

  .mode-toggle button {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .mode-toggle button.active {
    background: var(--grid-line);
    color: var(--text-main);
  }

  .board {
    position: relative;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    background: var(--grid-line);
    padding: 8px;
    border-radius: 14px;
    aspect-ratio: 1 / 1;
  }

  .cell {
    background: var(--bg-panel);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(36px, 10vw, 56px);
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    position: relative;
    transition: background 0.15s;
  }

  .cell:hover:not(.filled) {
    background: #182642;
  }

  .cell.filled { cursor: default; }

  .cell.x { color: var(--accent-x); }
  .cell.o { color: var(--accent-o); }

  .cell.pop { animation: pop 0.18s ease-out; }
  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .cell.win-cell {
    box-shadow: inset 0 0 0 2px var(--win-glow);
    animation: glow 1.2s ease-in-out infinite alternate;
  }
  @keyframes glow {
    from { box-shadow: inset 0 0 0 2px var(--win-glow); }
    to   { box-shadow: inset 0 0 0 2px var(--win-glow), 0 0 18px -2px var(--win-glow); }
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }

  .controls button {
    flex: 1;
    background: var(--bg-panel);
    border: 1px solid var(--grid-line);
    color: var(--text-main);
    font-family: inherit;
    font-size: 13px;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: border-color 0.15s, color 0.15s;
  }
  .controls button:hover {
    border-color: var(--accent-x);
    color: var(--accent-x);
  }

  .score {
    display: flex;
    justify-content: space-between;
    margin-top: 18px;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.03em;
  }
  .score b.x { color: var(--accent-x); }
  .score b.o { color: var(--accent-o); }

  @media (prefers-reduced-motion: reduce) {
    .cell.pop, .cell.win-cell { animation: none; }
  }
</style>
</head>
<body>

<main class="app">
  <p class="eyebrow">two players / one board</p>
  <h1>Tic-Tac-<span>Toe</span></h1>

  <div class="status-bar">
    <div id="status">Turn: <span class="mark-x">X</span></div>
    <div class="mode-toggle" role="group" aria-label="Game mode">
      <button id="mode-pvp" class="active">2 Player</button>
      <button id="mode-ai">Vs AI</button>
    </div>
  </div>

  <div class="board" id="board" role="grid" aria-label="Tic tac toe board"></div>

  <div class="controls">
    <button id="reset-round">Restart Round</button>
    <button id="reset-score">Reset Score</button>
  </div>

  <div class="score">
    <span>X wins: <b class="x" id="score-x">0</b></span>
    <span>Draws: <b id="score-d">0</b></span>
    <span>O wins: <b class="o" id="score-o">0</b></span>
  </div>
</main>

<script>
(function () {
  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const modePvpBtn = document.getElementById('mode-pvp');
  const modeAiBtn = document.getElementById('mode-ai');
  const scoreXEl = document.getElementById('score-x');
  const scoreOEl = document.getElementById('score-o');
  const scoreDEl = document.getElementById('score-d');

  const WIN_LINES = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  let board = Array(9).fill(null);
  let current = 'X';
  let gameOver = false;
  let vsAI = false;
  let scores = { X: 0, O: 0, D: 0 };

  function renderBoard() {
    boardEl.innerHTML = '';
    board.forEach((val, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell' + (val ? ' filled ' + val.toLowerCase() : '');
      cell.textContent = val || '';
      cell.setAttribute('role', 'gridcell');
      cell.setAttribute('aria-label', val ? `Cell ${i+1}: ${val}` : `Cell ${i+1}: empty`);
      cell.addEventListener('click', () => handleMove(i));
      boardEl.appendChild(cell);
    });
  }

  function checkWinner(b) {
    for (const line of WIN_LINES) {
      const [a, b1, c] = line;
      if (b[a] && b[a] === b[b1] && b[a] === b[c]) {
        return { winner: b[a], line };
      }
    }
    if (b.every(v => v)) return { winner: 'Draw', line: [] };
    return null;
  }

  function handleMove(i) {
    if (gameOver || board[i]) return;
    board[i] = current;
    animateCell(i);
    const result = checkWinner(board);
    if (result) {
      endGame(result);
      return;
    }
    current = current === 'X' ? 'O' : 'X';
    updateStatus();

    if (vsAI && current === 'O' && !gameOver) {
      setTimeout(aiMove, 350);
    }
  }

  function animateCell(i) {
    renderBoard();
    const cellEl = boardEl.children[i];
    cellEl.classList.add('pop');
  }

  function updateStatus() {
    statusEl.innerHTML = `Turn: <span class="mark-${current.toLowerCase()}">${current}</span>`;
  }

  function endGame(result) {
    gameOver = true;
    renderBoard();
    if (result.winner === 'Draw') {
      statusEl.textContent = "It's a draw";
      scores.D++;
      scoreDEl.textContent = scores.D;
    } else {
      statusEl.innerHTML = `<span class="mark-${result.winner.toLowerCase()}">${result.winner}</span> wins!`;
      result.line.forEach(idx => boardEl.children[idx].classList.add('win-cell'));
      scores[result.winner]++;
      (result.winner === 'X' ? scoreXEl : scoreOEl).textContent = scores[result.winner];
    }
  }

  // Simple AI: win if possible, block if needed, else take center/corner/random
  function aiMove() {
    if (gameOver) return;
    const empty = board.map((v, i) => v ? null : i).filter(v => v !== null);

    const findWinning = (mark) => {
      for (const i of empty) {
        const copy = board.slice();
        copy[i] = mark;
        if (checkWinner(copy)?.winner === mark) return i;
      }
      return null;
    };

    let move = findWinning('O') ?? findWinning('X');
    if (move === null) {
      if (empty.includes(4)) move = 4;
      else {
        const corners = [0, 2, 6, 8].filter(i => empty.includes(i));
        move = corners.length ? corners[Math.floor(Math.random() * corners.length)]
                              : empty[Math.floor(Math.random() * empty.length)];
      }
    }
    handleMove(move);
  }

  function resetRound() {
    board = Array(9).fill(null);
    current = 'X';
    gameOver = false;
    renderBoard();
    updateStatus();
  }

  function resetScore() {
    scores = { X: 0, O: 0, D: 0 };
    scoreXEl.textContent = 0;
    scoreOEl.textContent = 0;
    scoreDEl.textContent = 0;
  }

  document.getElementById('reset-round').addEventListener('click', resetRound);
  document.getElementById('reset-score').addEventListener('click', () => { resetScore(); resetRound(); });

  modePvpBtn.addEventListener('click', () => {
    vsAI = false;
    modePvpBtn.classList.add('active');
    modeAiBtn.classList.remove('active');
    resetRound();
  });

  modeAiBtn.addEventListener('click', () => {
    vsAI = true;
    modeAiBtn.classList.add('active');
    modePvpBtn.classList.remove('active');
    resetRound();
  });

  renderBoard();
  updateStatus();
})();
</script>

</body>
</html>
